openapi: 3.1.0
info:
  title: "Impact Metrics Ledger API"
  version: "1.0.0"
  description: "Backend API for A lightweight ledger for tracking client outcomes after Volta projects ship."
servers:
  - url: http://127.0.0.1:8787
    description: Python backend
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Product identity and health status
  /score:
    post:
      summary: Score evidence payload
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Release packet
 